<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nathan Nelson</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/f4bb7feb8b.js" crossorigin="anonymous"></script>
</head>

<body>
    <section id="about-me">
        <nav>
            <div class="personal__logo">
                Nathan Nelson
            </div>
            <div>
                <ul class="nav__link--list">
                    <li>
                        <a href="" class="
                    nav__link--anchor
                    link--hover-effect
                    link--hover-effect--black
                    ">Languages</a>
                    </li>
                    <li>
                        <a href="" class="
                    nav__link--anchor
                    link--hover-effect
                    link--hover-effect--black
                    ">Project</a>
                    </li>
                    <li>
                        <a href="" class="
                    nav__link--anchor
                    nav__link--anchor-primary
                    ">Contact</a>
                    </li>
                </ul>
        </nav>
        <div class="flex flex_1">
            <div class="about-me__info row">
                <div class="about-me__info--container">
                    <figure class="about-me__picture--mask">
                        <img src="/assets/me.png" class="about-me__picture" alt="Picture of Me!">
                    </figure>
                    <h1 class="about-me__info--title">
                        Hey! I'm <label for="name" class="text--purple">Nathan Nelson</label> 👋🏾
                    </h1>
                    <p class="about-me__info--para">
                        I'm a <strong class="text--purple">frontend software engineer</strong>.
                    </p>
                    <div class="about-me __links">
                        <a href="" class="about-me__link">
                            <i class="fa-brands fa-linkedin-in"></i>
                        </a>
                        <a href="" class="about-me__link">
                            <i class="fa-brands fa-github"></i>
                        </a>
                        <a href="" class="about-me__link">
                            <i class="fa-regular fa-envelope"></i>
                        </a>
                        <a href="" class="about-me__link">
                            <i class="fa-solid fa-file-pdf"></i>
                        </a>

                    </div>
                </div>
            </div>
            <figure class="about-me__img--container">
                <img src="/assets/undraw_coding-assistant.png" class="about-me__img" alt="About Me Image">
            </figure>
        </div>
    </section>
    <section id="languages">
        <div class="container">
            <div class="row">
                <h1 class="section__title">This is my <label class="text--purple">technology stack</label></h1>
                <div class="language__list">
                    <div class="language">
                        <figure class="language__img--wrapper">
                            <img src="/assets/HTML5.png" class="language__img" alt="">
                            <label class="language__name">HTML</label>
                    </div>
                    <div class="language">
                        <figure class="language__img--wrapper">
                            <img src="/assets/CSS3.png" class="language__img" alt="">
                            <label class="language__name">CSS</label>
                    </div>
                    <div class="language">
                        <figure class="language__img--wrapper">
                            <img src="/assets/JavaScript.png" class="language__img" alt="">
                            <label class="language__name">JavaScript</label>
                    </div>
                    <div class="language">
                        <figure class="language__img--wrapper">
                            <img src="/assets/React.png" class="language__img" alt="">
                            <label class="language__name">React</label>
                    </div>
                </div>
            </div>
        </div>

    </section>
</body>

</html>
